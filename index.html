<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>URL Shortner</title>
</head>
<body>
    <div class="container">
        <h1 class="h1u">URL Shortner</h1>
        <form id="shorten-form">
            <div class="url123">
                <label for="url">Enter URL</label>
                <input type="url" name="url" id="url" required>
            </div>
            <div class="url123">
                <label for="shortUrl">Enter short URL</label>
                <input type="text" name="shortUrl" id="shortUrl" required>
            </div>
            <button type="submit">Short</button>
        </form>
        <h2 class="h2">Shortend Urls</h2>
        <ul id="Shortend-urls"></ul>
    </div>

    <script>
        document.getElementById('shorten-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(event.target)
            const url = formData.get("url")
            const shortUrl = formData.get("shortUrl")
            console.log(url, shortUrl);

            try {
               const response = await fetch("/short", {
                method : "POST",
                headers : {"Content-Type": "application/json"},
                body: JSON.stringify({url, shortUrl})
               });
               if (response.ok) {
                alert("form submitted successfully");
                event.target.reset();
               } else {
                const errorMsg = await response.text();
                alert(errorMsg)
               }
            } catch (error) {
                console.log(error);
            }
            
        })
    </script>


</body>
</html>
